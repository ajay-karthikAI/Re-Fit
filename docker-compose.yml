services:
  postgres:
    # pgvector/pgvector:pg16 = Postgres 16 + the vector extension
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: refit
      POSTGRES_USER: refit
      POSTGRES_PASSWORD: refit
    ports:
      # 5432 and 5433 are taken by other local projects (suno, medextract)
      - "5434:5432"
    volumes:
      - refit_pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U refit -d refit"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - refit_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  refit_pgdata:
  refit_minio:
